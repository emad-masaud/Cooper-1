about.mission=Notre mission est de trouver un nouveau foyer pour l'humanité parmi les étoiles, assurant la survie de notre espèce.
about.story.title=La Mission
about.story.p1=Tout a commencé avec le Fléau. Le monde n'avait pas besoin de plus d'ingénieurs ; il avait besoin d'agriculteurs. Mais nous savions que regarder la terre n'était pas la solution.
about.story.p2=Les missions Lazare nous ont donné de l'espoir. Douze rangers envoyés dans l'inconnu. Nous avons construit l'Endurance non seulement pour explorer, mais pour sauver nos enfants.
about.story.p3=Aujourd'hui, nous sommes au bord d'une nouvelle dimension. Nous sommes mus par un amour qui transcende le temps et l'espace.
