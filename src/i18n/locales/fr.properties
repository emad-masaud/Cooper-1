faq.default.title=Foire Aux Questions
faq.default.subtitle=Tout ce que vous devez savoir sur le produit et la facturation.
faq.home.1.q=Ce boilerplate est-il gratuit ?
faq.home.1.a=Oui ! Le modèle de base est open-source et gratuit pour les projets personnels et commerciaux. Nous proposons aussi une version Pro avec des fonctionnalités avancées.
faq.home.2.q=Dois-je connaître React ?
faq.home.2.a=Bien que nous utilisions React pour les îlots interactifs, vous pouvez utiliser le framework de votre choix (Vue, Svelte, Solid) ou simplement du JS vanilla. Astro est agnostique.
faq.home.3.q=Comment fonctionne la recherche ?
faq.home.3.a=Nous utilisons Pagefind, une bibliothèque de recherche statique qui indexe votre site au moment de la construction. Résultats instantanés sans serveur externe.
faq.home.4.q=Puis-je déployer sur Vercel/Netlify ?
faq.home.4.a=Absolument. Le modèle est pré-configuré pour Vercel, Netlify et Cloudflare Pages.
faq.home.5.q=Qu'est-ce qui rend cela 'premium' ?
faq.home.5.a=Au-delà du design, nous incluons des configurations de niveau production pour le SEO, l'analyse, les sitemaps, les flux RSS, etc.
faq.pricing.1.q=Puis-je changer de plan plus tard ?
faq.pricing.1.a=Oui, vous pouvez mettre à niveau ou rétrograder à tout moment.
faq.pricing.2.q=Y a-t-il un essai gratuit ?
faq.pricing.2.a=Nous offrons un essai gratuit de 14 jours sur le plan Pro.
faq.pricing.3.q=Quels paiements acceptez-vous ?
faq.pricing.3.a=Nous acceptons les principales cartes de crédit, PayPal et virements bancaires.
faq.pricing.4.q=Offrez-vous des remboursements ?
faq.pricing.4.a=Oui, garantie de remboursement de 30 jours si vous n'êtes pas satisfait.
